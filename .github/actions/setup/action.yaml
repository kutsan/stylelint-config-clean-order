name: Setup
description: Install pnpm and Node, install dependencies.

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '26'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
